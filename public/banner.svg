<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800&amp;display=swap');
    
    .bg { fill: #0A0D14; }
    
    .pulse {
      stroke: #4E8CFF;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw 4s linear infinite;
    }
    
    .glow {
      stroke: #10B981;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      opacity: 0.3;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw 4s linear infinite;
      filter: blur(4px);
    }
    
    .text-title {
      font-family: 'Inter', sans-serif;
      font-size: 54px;
      font-weight: 800;
      fill: url(#title-grad);
    }
    
    .text-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      fill: #8A99AD;
      letter-spacing: 0.12em;
    }
    
    .pulse-dot {
      fill: #10B981;
      animation: blink 1.5s infinite;
    }

    @keyframes draw {
      0% {
        stroke-dashoffset: 1000;
      }
      70% {
        stroke-dashoffset: 0;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }
    
    @keyframes blink {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>
  
  <defs>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4E8CFF" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="300" rx="15" class="bg" />
  
  <!-- Grid Lines for High Tech Look -->
  <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <path d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 500,0 L 500,300 M 600,0 L 600,300 M 700,0 L 700,300" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  
  <!-- Heartbeat ECG line animation -->
  <path d="M 50,150 L 220,150 L 240,120 L 260,180 L 280,90 L 300,210 L 320,140 L 330,160 L 350,150 L 750,150" class="glow" />
  <path d="M 50,150 L 220,150 L 240,120 L 260,180 L 280,90 L 300,210 L 320,140 L 330,160 L 350,150 L 750,150" class="pulse" />
  
  <!-- Pulsing dot at peak -->
  <circle cx="280" cy="90" r="6" class="pulse-dot" />
  
  <!-- Text Content -->
  <text x="410" y="145" class="text-title">🩺 HIA</text>
  <text x="410" y="185" class="text-subtitle">HEALTH INSIGHTS AGENT</text>
</svg>
